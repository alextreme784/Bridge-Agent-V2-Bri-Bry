<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <title>Bridge AI</title>
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #0a0f1a 0%, #1a0f2e 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
    }

    /* ════════════════════════════════════════
       AMBIENT BACKGROUND (widget mode only)
    ════════════════════════════════════════ */
    .ai-ambient {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 32px 24px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .ai-ambient::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 60%, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .ambient-orb {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED 0%, #009E60 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      box-shadow: 0 0 0 0 rgba(124,58,237,0.4);
      animation: orbPulse 3s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4), 0 0 40px rgba(124,58,237,0.2); }
      50%       { box-shadow: 0 0 0 18px rgba(124,58,237,0), 0 0 60px rgba(124,58,237,0.3); }
    }

    .ambient-title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #9D72FF, #009E60);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ambient-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      max-width: 220px;
      line-height: 1.5;
    }

    /* ════════════════════════════════════════
       CHAT PANEL
    ════════════════════════════════════════ */
    .ai-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      transition: border-radius 0.3s ease, box-shadow 0.3s ease;
    }

    /* Widget handle bar */
    .widget-handle {
      display: none;
      width: 40px; height: 4px;
      background: var(--border-medium);
      border-radius: 2px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .ai-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .ai-back {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      flex-shrink: 0;
    }
    .ai-back:active { background: var(--bg-card); }

    .ai-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED 0%, #009E60 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      position: relative;
      transition: box-shadow 0.3s ease;
    }
    .ai-avatar.thinking {
      box-shadow: 0 0 0 3px rgba(124,58,237,0.5), 0 0 0 6px rgba(124,58,237,0.2), 0 0 0 9px rgba(124,58,237,0.08);
      animation: avatarThink 1.4s ease-in-out infinite;
    }
    @keyframes avatarThink {
      0%, 100% { box-shadow: 0 0 0 3px rgba(124,58,237,0.5), 0 0 0 7px rgba(124,58,237,0.2), 0 0 0 11px rgba(124,58,237,0.06); }
      50%       { box-shadow: 0 0 0 4px rgba(0,158,96,0.6),   0 0 0 9px rgba(0,158,96,0.2),    0 0 0 14px rgba(0,158,96,0.06); }
    }

    .ai-header-info { flex: 1; min-width: 0; }
    .ai-header-name { font-size: 0.9rem; font-weight: 700; }
    .ai-header-status {
      font-size: 0.65rem;
      color: var(--accent-primary);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
    }
    .ai-header-status::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-primary);
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-full);
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }

    .mode-btn {
      background: none;
      border: none;
      width: 30px; height: 28px;
      border-radius: 50px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, color 0.18s;
    }
    .mode-btn svg { width: 15px; height: 15px; }
    .mode-btn.active {
      background: linear-gradient(135deg, #7C3AED, #009E60);
      color: #fff;
    }

    /* ── Messages ── */
    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .msg { max-width: 84%; animation: msgIn 0.2s ease; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg--ai   { align-self: flex-start; }
    .msg--user { align-self: flex-end; }

    .msg-bubble {
      padding: 9px 13px;
      font-size: 0.86rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg--ai .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 2px 12px rgba(124,58,237,0.12);
    }
    .msg--ai .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding: 0 2px;
    }
    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .copy-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
    .copy-btn.copied { color: #009E60; }
    .msg--user .msg-bubble {
      background: linear-gradient(135deg, #7C3AED, #009E60);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }
    .msg-time {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg--user .msg-time { text-align: right; }

    /* ── Typing indicator ── */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 4px 16px 16px 16px;
      padding: 12px 15px;
      animation: msgIn 0.2s ease;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30%            { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Welcome screen ── */
    .ai-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      flex: 1;
      padding: 24px 20px;
    }
    .ai-welcome-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED, #009E60);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .ai-welcome h2 { font-size: 1.1rem; font-weight: 700; }
    .ai-welcome p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 260px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }
    .chip {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:active { border-color: #7C3AED; color: #9D72FF; }

    /* ── Input bar ── */
    .ai-input-bar {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .ai-textarea {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: 20px;
      color: var(--text-primary);
      font-size: 0.88rem;
      font-family: inherit;
      padding: 9px 14px;
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    .ai-textarea:focus { border-color: #7C3AED; }
    .ai-textarea::placeholder { color: var(--text-muted); }

    .ai-icon-btn {
      background: none;
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.05rem;
      flex-shrink: 0;
      transition: transform 0.1s, background 0.15s;
    }
    .ai-icon-btn:active { transform: scale(0.9); }

    .btn-mic {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
    }
    .btn-mic.listening {
      background: rgba(255,82,82,0.12);
      border-color: #ff5252;
      color: #ff5252;
      animation: micPulse 1s infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,82,82,0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(255,82,82,0); }
    }

    .btn-send {
      background: linear-gradient(135deg, #7C3AED, #009E60);
      color: #fff;
    }
    .btn-send:disabled {
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: default;
    }

    /* ════════════════════════════════════════
       WIDGET MODE overrides
    ════════════════════════════════════════ */
    body.mode-widget .ai-ambient {
      display: flex;
    }

    body.mode-widget .ai-panel {
      flex: none;
      height: 58dvh;
      border-radius: 24px 24px 0 0;
      background: var(--bg-surface);
      box-shadow: 0 -12px 48px rgba(0,0,0,0.65), 0 -2px 0 rgba(124,58,237,0.3);
      overflow: hidden;
    }

    body.mode-widget .widget-handle {
      display: block;
    }

    body.mode-widget .ai-header {
      background: transparent;
      border-bottom-color: var(--border-subtle);
    }

    body.mode-widget .ai-input-bar {
      background: var(--bg-card);
      border-top-color: var(--border-subtle);
    }

    /* Slide-up entrance in widget mode */
    body.mode-widget .ai-panel {
      animation: panelSlideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes panelSlideUp {
      from { transform: translateY(100%); opacity: 0.5; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    
    .ai-suggestions-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      overflow-x: auto;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      white-space: nowrap;
      scrollbar-width: none;
      transition: all 0.2s ease;
    }
    .ai-suggestions-bar::-webkit-scrollbar {
      display: none;
    }
    .ai-suggestions-bar.hide {
      display: none;
    }
    .sugg-pill {
      background: var(--bg-card);
      border: 1px solid rgba(124, 58, 237, 0.45);
      color: var(--text-primary);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 6px 13px;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .sugg-pill:active {
      transform: scale(0.95);
      background: rgba(124, 58, 237, 0.15);
      border-color: #7C3AED;
    }

    /* ════════════════════════════════════════
       BRIDGE BROWSER
    ════════════════════════════════════════ */
    .bb-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      background: transparent;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .bb-overlay.open {
      pointer-events: all;
      opacity: 1;
    }
    .bb-backdrop {
      flex: 0 0 60px;
      background: rgba(0,0,0,0.55);
      cursor: pointer;
    }
    .bb-sheet {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d0d1a;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 48px rgba(0,0,0,0.8), 0 -2px 0 rgba(124,58,237,0.5);
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .bb-overlay.open .bb-sheet {
      transform: translateY(0);
    }
    .bb-drag-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .bb-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 10px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .bb-nav-btn {
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      color: var(--text-secondary, #aaa);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .bb-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .bb-nav-btn:not(:disabled):active { background: rgba(124,58,237,0.3); }
    .bb-url-pill {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
      user-select: none;
    }
    .bb-close-btn {
      background: rgba(255,82,82,0.15);
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      color: #ff5252;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .bb-close-btn:active { background: rgba(255,82,82,0.35); }
    .bb-progress {
      height: 3px;
      background: linear-gradient(90deg, #7C3AED, #009E60);
      width: 0%;
      transition: width 0.3s ease;
      flex-shrink: 0;
    }
    .bb-progress.done {
      opacity: 0;
      transition: opacity 0.4s ease 0.2s;
    }
    .bb-frame {
      flex: 1;
      border: none;
      background: #fff;
      display: block;
    }
    .bb-fallback {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 24px;
      text-align: center;
    }
    .bb-fallback.show { display: flex; }
    .bb-fallback-icon { font-size: 3rem; }
    .bb-fallback h3 { font-size: 1rem; font-weight: 700; color: #fff; }
    .bb-fallback p { font-size: 0.8rem; color: rgba(255,255,255,0.5); line-height: 1.5; max-width: 280px; }
    .bb-open-external {
      background: linear-gradient(135deg, #7C3AED, #009E60);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 12px 28px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .bb-open-external:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="ai-panel">
    <div class="widget-handle" style="display:none"></div>

    <header class="ai-header">
      <button class="ai-back" onclick="history.back()" aria-label="Back">&#8592;</button>
      <div class="ai-avatar">🤖</div>
      <div class="ai-header-info">
        <div class="ai-header-name">Bridge AI</div>
        <div class="ai-header-status">Online</div>
      </div>

      <button class="ai-icon-btn" id="clearBtn" aria-label="Clear chat" title="Clear chat" style="background:none;border:none;color:var(--text-muted);font-size:0.78rem;width:auto;padding:4px 8px;border-radius:8px;gap:3px;flex-shrink:0" onclick="clearChat()">🗑 Clear</button>

      <!-- Mode toggle -->
      <div class="mode-toggle" role="group" aria-label="View mode">
        <button class="mode-btn active" data-mode="full" aria-label="Full screen" title="Full screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
          </svg>
        </button>
        <button class="mode-btn" data-mode="widget" aria-label="Floating widget" title="Floating widget">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <rect x="2" y="11" width="20" height="11" rx="3"/>
            <path d="M6 11V7a6 6 0 0 1 12 0v4"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="ai-messages" id="messages"></div>
    <div class="ai-suggestions-bar hide" id="suggestionsBar"></div>
    <div class="ai-input-bar">
      <button class="ai-icon-btn btn-mic" id="micBtn" aria-label="Voice input">🎤</button>
      <textarea class="ai-textarea" id="msgInput" placeholder="Ask Bridge AI..." rows="1"></textarea>
      <button class="ai-icon-btn btn-send" id="sendBtn" disabled aria-label="Send">&#10148;</button>
    </div>
    <div style="text-align:center;padding:5px 0 calc(5px + env(safe-area-inset-bottom,0px));font-size:0.62rem;color:rgba(255,255,255,0.25);flex-shrink:0;background:transparent">Powered by Bridge AI 🤖</div>
  </div>

  <!-- ═══════════════════════════════════════
       BRIDGE BROWSER OVERLAY
  ════════════════════════════════════════ -->
  <div class="bb-overlay" id="bbOverlay" role="dialog" aria-label="BridgeBrowser" aria-modal="true">
    <div class="bb-backdrop" id="bbBackdrop"></div>
    <div class="bb-sheet">
      <div class="bb-drag-handle"></div>
      <div class="bb-toolbar">
        <button class="bb-nav-btn" id="bbBack" disabled aria-label="Back">&#8592;</button>
        <button class="bb-nav-btn" id="bbForward" disabled aria-label="Forward">&#8594;</button>
        <button class="bb-nav-btn" id="bbRefresh" aria-label="Refresh">&#8635;</button>
        <div class="bb-url-pill" id="bbUrl">Loading...</div>
        <button class="bb-nav-btn" id="bbShare" aria-label="Share">&#8679;</button>
        <button class="bb-close-btn" id="bbClose" aria-label="Close BridgeBrowser">&times;</button>
      </div>
      <div class="bb-progress" id="bbProgress"></div>
      <iframe class="bb-frame" id="bbFrame"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
        referrerpolicy="no-referrer"
        title="BridgeBrowser">
      </iframe>
      <div class="bb-fallback" id="bbFallback">
        <div class="bb-fallback-icon">🔒</div>
        <h3>Can't preview this page</h3>
        <p>This website restricts embedding. Tap the button below to open it in your browser.</p>
        <button class="bb-open-external" id="bbOpenExternal">Open in Browser ↗</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL     = 'https://api.bridgepro.a3tech.uk/api/v1/ai/connek-chat';
    const countryCode = localStorage.getItem('connek_country') || 'SVG';
    const PREF_KEY    = 'connek_ai_mode';

    const msgArea  = document.getElementById('messages');
    const input    = document.getElementById('msgInput');
    const sendBtn  = document.getElementById('sendBtn');
    const micBtn   = document.getElementById('micBtn');

    let typingEl = null;
    let busy     = false;

    /* ════════════════════════════════════════
       BRIDGE BROWSER
    ════════════════════════════════════════ */
    const bbOverlay  = document.getElementById('bbOverlay');
    const bbBackdrop = document.getElementById('bbBackdrop');
    const bbFrame    = document.getElementById('bbFrame');
    const bbUrlPill  = document.getElementById('bbUrl');
    const bbProgress = document.getElementById('bbProgress');
    const bbFallback = document.getElementById('bbFallback');
    const bbBackBtn  = document.getElementById('bbBack');
    const bbFwdBtn   = document.getElementById('bbForward');
    const bbRefresh  = document.getElementById('bbRefresh');
    const bbShare    = document.getElementById('bbShare');
    const bbClose    = document.getElementById('bbClose');
    const bbOpenExt  = document.getElementById('bbOpenExternal');

    let bbCurrentUrl  = '';
    let bbHistory     = [];
    let bbHistoryIdx  = -1;
    let bbProgTimer;

    function bbOpen(url, title) {
      url = url.trim();
      bbCurrentUrl = url;

      // Show URL pill — clean hostname display
      try { bbUrlPill.textContent = new URL(url).hostname; } catch(_) { bbUrlPill.textContent = url; }

      // History management
      if (bbHistory[bbHistoryIdx] !== url) {
        bbHistory = bbHistory.slice(0, bbHistoryIdx + 1);
        bbHistory.push(url);
        bbHistoryIdx++;
      }
      bbNavSync();

      // Progress bar animation
      bbProgress.classList.remove('done');
      bbProgress.style.transition = 'none';
      bbProgress.style.width = '0%';
      clearTimeout(bbProgTimer);
      requestAnimationFrame(() => {
        bbProgress.style.transition = 'width 0.3s ease';
        bbProgress.style.width = '75%';
      });

      // Show iframe, hide fallback
      bbFrame.style.display = 'block';
      bbFallback.classList.remove('show');

      // Load URL
      bbFrame.src = url;
      bbOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      bbFrame.onload = () => {
        bbProgress.style.width = '100%';
        bbProgTimer = setTimeout(() => bbProgress.classList.add('done'), 500);
        // Detect blank load (X-Frame-Options denial shows empty doc in some browsers)
        try {
          const doc = bbFrame.contentDocument;
          if (doc && doc.body && doc.body.innerHTML.trim() === '') bbShowFallback(url);
        } catch(_) { /* cross-origin: probably loaded fine */ }
      };
      bbFrame.onerror = () => bbShowFallback(url);
    }

    function bbShowFallback(url) {
      bbFrame.style.display = 'none';
      bbFallback.classList.add('show');
      bbProgress.style.width = '100%';
      bbProgTimer = setTimeout(() => bbProgress.classList.add('done'), 400);
    }

    function bbDismiss() {
      bbOverlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { bbFrame.src = 'about:blank'; }, 380);
    }

    function bbNavSync() {
      bbBackBtn.disabled = bbHistoryIdx <= 0;
      bbFwdBtn.disabled  = bbHistoryIdx >= bbHistory.length - 1;
    }

    bbClose.addEventListener('click',    bbDismiss);
    bbBackdrop.addEventListener('click', bbDismiss);
    bbBackBtn.addEventListener('click', () => {
      if (bbHistoryIdx > 0) { bbHistoryIdx--; bbOpen(bbHistory[bbHistoryIdx], ''); }
    });
    bbFwdBtn.addEventListener('click', () => {
      if (bbHistoryIdx < bbHistory.length - 1) { bbHistoryIdx++; bbOpen(bbHistory[bbHistoryIdx], ''); }
    });
    bbRefresh.addEventListener('click', () => { bbFrame.src = bbFrame.src; });
    bbShare.addEventListener('click', async () => {
      if (navigator.share) {
        try { await navigator.share({ url: bbCurrentUrl }); } catch(_) {}
      } else {
        try {
          await navigator.clipboard.writeText(bbCurrentUrl);
          const orig = bbShare.innerHTML;
          bbShare.textContent = '✓';
          setTimeout(() => bbShare.innerHTML = orig, 1600);
        } catch(_) {}
      }
    });
    bbOpenExt.addEventListener('click', () => window.open(bbCurrentUrl, '_blank'));

    // Swipe down to close
    let _bbTY = 0;
    bbOverlay.addEventListener('touchstart', e => { _bbTY = e.touches[0].clientY; }, { passive: true });
    bbOverlay.addEventListener('touchend',   e => {
      if (e.changedTouches[0].clientY - _bbTY > 80) bbDismiss();
    }, { passive: true });

    // Escape key
    document.addEventListener('keydown', e => { if (e.key === 'Escape') bbDismiss(); });


    /* ════════════════════════════════════════
       APP MAP
    ════════════════════════════════════════ */
    const APP_MAP = {
      calendar: 'My Calendar',   tasks: 'Tasks',
      translate: 'Bridge Translate', news: 'Caribbean News',
      fitness: 'Fitness Tracker', meals: 'Meal Planner',
      arcade: 'Game Hub',        study: 'Study Hub',
      tip: 'Tip Line',           ocr: 'Text Scanner',
      bridgemeet: 'BridgeMeet',  cashflow: 'Cashflow',
      qrquest: 'QR Quest',       social: 'Bridge Social',
      wahgwaan: 'Wah Gwaan'
    };


    /* ════════════════════════════════════════
       REPLY RENDERER
    ════════════════════════════════════════ */
    function renderReply(raw) {
      return raw
        // 1. Newlines → breaks (before escaping so we don't double-process)
        .split('\n').join('§NL§')
        // 2. Escape HTML
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        // 3. [OPEN_URL:url|Title] → BridgeBrowser pill button
        .replace(/\[OPEN_URL:([^\|^\]]+)\|?([^\]]*)\]/g, (_, rawUrl, title) => {
          const url = rawUrl.trim();
          let host; try { host = new URL(url).hostname; } catch(_) { host = url; }
          const label = (title || '').trim() || host;
          return `<button onclick="bbOpen('${url.replace(/'/g,"\\'")}','${label.replace(/'/g,"\\'")}')"`
            + ` style="background:rgba(124,58,237,0.18);border:1px solid rgba(124,58,237,0.45);`
            + `border-radius:20px;color:#b89aff;padding:5px 14px;margin:3px 2px;cursor:pointer;`
            + `font-size:0.77rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;`
            + `vertical-align:middle;">🌐 ${label}</button>`;
        })
        // 4. [OPEN_APP:app] → app navigation button
        .replace(/\[OPEN_APP:(\w+)\]/g, (_, app) => {
          const label = APP_MAP[app] || app;
          return `<button onclick="window.location.href='/wpas/${app}.html'"`
            + ` style="background:#6366f1;border:none;border-radius:20px;color:#fff;`
            + `padding:6px 14px;margin:4px 2px;cursor:pointer;font-size:0.8rem;`
            + `font-weight:600;display:inline-flex;align-items:center;gap:4px;vertical-align:middle;">🚀 ${label}</button>`;
        })
        // 5. [BUSINESS:name:id] → BridgePro listing button (opens in BridgeBrowser)
        .replace(/\[BUSINESS:([^\:^\]]+):([^\]]*)\]/g, (_, name, id) => {
          const url = id?.trim()
            ? 'https://bridgepro.a3tech.uk/#/listing/' + id.trim()
            : 'https://bridgepro.a3tech.uk';
          return `<button onclick="bbOpen('${url}','${name.replace(/'/g,"\\'")}')"`
            + ` style="background:#009E60;border:none;border-radius:20px;color:#fff;`
            + `padding:6px 14px;margin:4px 2px;cursor:pointer;font-size:0.8rem;`
            + `font-weight:600;display:inline-flex;align-items:center;gap:4px;vertical-align:middle;">🏪 ${name}</button>`;
        })
        // 6. Bare https:// URLs not already inside a button → BridgeBrowser link chip
        .replace(/(https?:\/\/[^\s&lt;&gt;"'\)]+)/g, (url) => {
          let host; try { host = new URL(url).hostname; } catch(_) { host = url; }
          return `<button onclick="bbOpen('${url.replace(/'/g,"\\'")}','${host}')" `
            + `style="background:rgba(0,158,96,0.12);border:1px solid rgba(0,158,96,0.35);`
            + `border-radius:8px;color:#4ecca3;padding:3px 9px;cursor:pointer;`
            + `font-size:0.75rem;vertical-align:middle;">🔗 ${host}</button>`;
        })
        // 7. Bold **text**
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        // 8. Restore newlines
        .split('§NL§').join('<br>');
    }


    /* ════════════════════════════════════════
       CHAT HELPERS
    ════════════════════════════════════════ */
    function nowStr() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMsg(text, role) {
      msgArea.querySelector('.ai-welcome')?.remove();
      const el = document.createElement('div');
      el.className = `msg msg--${role}`;
      const content = role === 'ai'
        ? renderReply(text)
        : text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      const copyBlock = role === 'ai' ? `
        <div class="msg-actions">
          <button class="copy-btn" onclick="copyMsg(this, ${JSON.stringify(text.replace(/<[^>]*>/g,''))})">📋 Copy</button>
        </div>` : '';
      el.innerHTML = `
        <div class="msg-bubble">${content}</div>
        <div class="msg-time">${nowStr()}</div>
        ${copyBlock}`;
      msgArea.appendChild(el);
      msgArea.scrollTop = msgArea.scrollHeight;
    }

    function copyMsg(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {});
    }

    const avatarEl = document.querySelector('.ai-avatar');
    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement('div');
      typingEl.className = 'typing-indicator';
      typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      msgArea.appendChild(typingEl);
      msgArea.scrollTop = msgArea.scrollHeight;
      avatarEl?.classList.add('thinking');
    }
    function hideTyping() { typingEl?.remove(); typingEl = null; avatarEl?.classList.remove('thinking'); }

    function showWelcome() {
      const prompts = [
        'What\'s the latest news in SVG?',
        'Find me a caterer in Kingstown',
        'Add a reminder to my calendar',
        'What events are happening this week?',
      ];
      msgArea.innerHTML = `
        <div class="ai-welcome">
          <div class="ai-welcome-icon">🤖</div>
          <h2>Bridge AI</h2>
          <p>Your Caribbean assistant — ask about local news, services, businesses, and more.</p>
          <div class="chip-row">
            ${prompts.map(p => `<button class="chip" onclick="sendMessage(${JSON.stringify(p)})">${p}</button>`).join('')}
          </div>
        </div>`;
    }
    function clearChat() { showWelcome(); }


    /* ════════════════════════════════════════
       SEND MESSAGE
    ════════════════════════════════════════ */
    async function sendMessage(text) {
      const msg = (text !== undefined ? text : input.value).trim();
      if (!msg || busy) return;
      busy = true;
      input.value = '';
      input.style.height = '';
      sendBtn.disabled = true;
      updateSuggestions();
      addMsg(msg, 'user');
      showTyping();
      try {
        const token = localStorage.getItem('connek_access_token');
        const headers = {
          'Content-Type': 'application/json',
          'X-Country-Code': countryCode,
          'X-Client': 'connek-ai/2.0',
        };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const res = await fetch(API_URL, {
          method: 'POST',
          headers,
          body: JSON.stringify({ message: msg, country_code: countryCode }),
        });
        const data = await res.json().catch(() => ({}));
        hideTyping();
        addMsg(data.reply || data.error || 'Bridge AI is taking a break, try again shortly.', 'ai');
      } catch (err) {
        console.error('Bridge AI fetch error:', err);
        hideTyping();
        addMsg('Bridge AI is taking a break, try again shortly.', 'ai');
      } finally {
        busy = false;
      }
    }


    /* ════════════════════════════════════════
       PILL SUGGESTIONS
    ════════════════════════════════════════ */
    const suggApps = [
      { id: 'calendar',   title: 'Calendar 📅',       keywords: ['calendar','schedule','date','booking','time','appointment','agenda','reminder','tomorrow','next week','alarm'] },
      { id: 'tasks',      title: 'Tasks 📝',           keywords: ['tasks','todo','to-do','list','checklist','chores','follow-up'] },
      { id: 'translate',  title: 'Translate 🌍',       keywords: ['translate','translation','language','speak','spanish','french','patois','creole','dictionary'] },
      { id: 'news',       title: 'News 📰',            keywords: ['news','buzz','article','headlines','feed','current events','read','paper','latest'] },
      { id: 'fitness',    title: 'Fitness 🏃',         keywords: ['fitness','workout','gym','exercise','cardio','running','health','steps','run'] },
      { id: 'meals',      title: 'Meal Planner 🍲',   keywords: ['meal','meals','recipe','cooking','lunch','dinner','food','eat','ingredients','prep'] },
      { id: 'arcade',     title: 'Arcade 🎮',          keywords: ['game','play','fun','bored','arcade','gaming','play game'] },
      { id: 'study',      title: 'Study Hub 📚',       keywords: ['study','flashcard','quiz','learn','test','exam','revision','practice'] },
      { id: 'tip',        title: 'Tip Line 🔒',        keywords: ['tip','report','anonymous','alert','crime','tip line'] },
      { id: 'ocr',        title: 'Scanner 📷',         keywords: ['ocr','scanner','scan','read photo','extract text','scan image'] },
      { id: 'bridgemeet', title: 'Video Call 👥',      keywords: ['meet','video','call','conference','meeting','zoom','video call'] },
      { id: 'cashflow',   title: 'Cashflow 💸',        keywords: ['cashflow','money','expenses','budget','finance','tracker','spending','accounting'] },
      { id: 'qrquest',    title: 'QR Quest 🔍',        keywords: ['qr','scan','code','code scanner','scan code','bar code'] },
      { id: 'social',     title: 'Bridge Social 💬',   keywords: ['social','feed','post','comment','share','community','wall','updates'] },
      { id: 'wahgwaan',   title: 'Wah Gwaan 💬',       keywords: ['chat','local chat','community chat','chatroom'] }
    ];

    function updateSuggestions() {
      const val = input.value.toLowerCase();
      const bar = document.getElementById('suggestionsBar');
      if (!val.trim()) { bar.innerHTML = ''; bar.classList.add('hide'); return; }

      const hasDate =
        /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+\d+/i.test(val) ||
        /\b\d+\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*/i.test(val) ||
        /\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday|mon|tue|wed|thu|fri|sat|sun)\b/i.test(val) ||
        /\b\d{1,2}[\/\-]\d{1,2}([\/-]\d{2,4})?\b/.test(val) ||
        /\b\d+(st|nd|rd|th)\b/i.test(val) ||
        /\b(tomorrow|tonight|next\s+(week|month|year))\b/i.test(val);

      const matches = suggApps.filter(app => {
        if (hasDate && (app.id === 'calendar' || app.id === 'tasks')) return true;
        return app.keywords.some(k => val.includes(k));
      });

      if (matches.length) {
        bar.innerHTML = matches.map(app =>
          `<div class="sugg-pill" onclick="window.location.href='/wpas/${app.id}.html'">🚀 Open ${app.title}</div>`
        ).join('');
        bar.classList.remove('hide');
      } else {
        bar.innerHTML = ''; bar.classList.add('hide');
      }
    }


    /* ════════════════════════════════════════
       MODE TOGGLE
    ════════════════════════════════════════ */
    document.querySelector('.mode-btn[data-mode="full"]')?.classList.add('active');
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        localStorage.setItem(PREF_KEY, mode);
        if (mode === 'widget') window.location.href = '/?open=ai';
      });
    });


    /* ════════════════════════════════════════
       INPUT EVENTS
    ════════════════════════════════════════ */
    input.addEventListener('input', () => {
      sendBtn.disabled = !input.value.trim();
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
      updateSuggestions();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', () => sendMessage());


    /* ════════════════════════════════════════
       VOICE INPUT
    ════════════════════════════════════════ */
    const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechAPI) {
      const recognition = new SpeechAPI();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      let listening = false;
      micBtn.addEventListener('click', () => {
        if (listening) { recognition.stop(); return; }
        try { recognition.start(); } catch(_) {}
      });
      recognition.onstart  = () => { listening = true;  micBtn.classList.add('listening'); };
      recognition.onend    = () => { listening = false; micBtn.classList.remove('listening'); };
      recognition.onerror  = () => { listening = false; micBtn.classList.remove('listening'); };
      recognition.onresult = e => {
        input.value = e.results[0][0].transcript;
        sendBtn.disabled = false;
        sendMessage();
      };
    } else {
      micBtn.style.display = 'none';
    }

    showWelcome();
  </script>
</body>
</html>
